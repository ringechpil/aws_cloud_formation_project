AWSTemplateFormatVersion: 2010-09-09
Description: Application Load Balancer, Launch Template, and Auto Scaling Group

Parameters:

  NetworkStackName:
    Type: String
    Default: network-stack
    Description: Name of the network-security stack to import values from

  AmazonLinuxAMIID:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: vockey


Resources:

###########
# Application Load Balancer
###########

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: WebAppALB
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - Fn::ImportValue: !Sub '${NetworkStackName}-PublicSubnet1Id'
        - Fn::ImportValue: !Sub '${NetworkStackName}-PublicSubnet2Id'
      SecurityGroups:
        - Fn::ImportValue: !Sub '${NetworkStackName}-LoadBalancerSecurityGroupId'
      Tags:
        - Key: Name
          Value: WebAppALB

###########
# Target Group
###########

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: WebAppTargetGroup
      VpcId:
        Fn::ImportValue: !Sub '${NetworkStackName}-VpcId'
      Protocol: HTTP
      Port: 80
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health.html
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetType: instance
      Tags:
        - Key: Name
          Value: WebAppTargetGroup

###########
# Listener
###########

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup


###########
# Launch Template
###########

  WordPressLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: WordPressLaunchTemplate
      LaunchTemplateData:
        ImageId: !Ref AmazonLinuxAMIID
        InstanceType: t3.micro
        KeyName: !Ref KeyPairName
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${NetworkStackName}-WebServerSecurityGroupId'
        UserData:
          Fn::Base64: |
            #!/bin/bash
            # Update OS
            dnf update -y

            # Install Packages
            dnf install -y \
            httpd \
            php \
            php-mysqlnd \
            php-fpm \
            mariadb105-server \
            wget \
            tar

            # Enable Services
            systemctl enable httpd
            systemctl start httpd

            systemctl enable mariadb
            systemctl start mariadb

            # Create Database and User
            mysql -u root <<EOF
            CREATE DATABASE wordpress;
            CREATE USER 'wpuser'@'localhost' IDENTIFIED BY 'Password123!';
            GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'localhost';
            FLUSH PRIVILEGES;
            EOF

            # Download WordPress
            cd /tmp
            wget https://wordpress.org/latest.tar.gz
            tar -xzf latest.tar.gz

            # Remove Apache Default Page
            rm -rf /var/www/html/*

            # Copy WordPress Files
            cp -r wordpress/* /var/www/html/

            # Configure WordPress
            cd /var/www/html
            cp wp-config-sample.php wp-config.php
            sed -i "s/database_name_here/wordpress/" wp-config.php
            sed -i "s/username_here/wpuser/" wp-config.php
            sed -i "s/password_here/Password123!/" wp-config.php

            # Permissions
            chown -R apache:apache /var/www/html
            find /var/www/html -type d -exec chmod 755 {} \;
            find /var/www/html -type f -exec chmod 644 {} \;

            # Restart Apache
            systemctl restart httpd

            # Create Health Check Page
            echo "<h1>WordPress Installation Completed Successfully</h1>" > /var/www/html/health.html
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: WordPress-ASG-Instance


###########
# Outputs
###########

Outputs:

  LoadBalancerDNS:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerDNS'

  LoadBalancerArn:
    Description: ARN of the Application Load Balancer
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub '${AWS::StackName}-LoadBalancerArn'

  TargetGroupArn:
    Description: ARN of the Target Group
    Value: !Ref ALBTargetGroup
    Export:
      Name: !Sub '${AWS::StackName}-TargetGroupArn'

  ALBListenerArn:
    Description: ARN of the ALB Listener
    Value: !Ref ALBListener
    Export:
      Name: !Sub '${AWS::StackName}-ALBListenerArn'

  LaunchTemplateId:
    Description: ID of the WordPress Launch Template
    Value: !Ref WordPressLaunchTemplate
    Export:
      Name: !Sub '${AWS::StackName}-LaunchTemplateId'
